name: Build APK and create release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - uses: android-actions/setup-android@v3

      - uses: gradle/actions/setup-gradle@v4

      - name: Build debug APK
        run: gradle assembleDebug

      - name: Rename APK with version
        id: rename
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          [ -z "$VERSION" ] && VERSION="dev"
          mv app/build/outputs/apk/debug/app-debug.apk "app/build/outputs/apk/debug/xkeen-android-${VERSION}.apk"
          echo "apk_path=app/build/outputs/apk/debug/xkeen-android-${VERSION}.apk" >> "$GITHUB_OUTPUT"

      - name: Upload APK as artifact
        uses: actions/upload-artifact@v4
        with:
          name: xkeen-android-apk
          path: ${{ steps.rename.outputs.apk_path }}

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ steps.rename.outputs.apk_path }}
          generate_release_notes: true
          fail_on_unmatched_files: true
